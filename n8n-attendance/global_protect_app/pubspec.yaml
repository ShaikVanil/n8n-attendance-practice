name: global_protect_app
description: A Flutter clock-in application with location-based attendance tracking.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Network
  dio: ^5.3.2
  connectivity_plus: ^5.0.1
  
  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2
  
  # Functional Programming
  dartz: ^0.10.1
  
  # Location Services
  battery_plus: ^6.0.1
  device_info_plus: ^10.1.0
  geolocator: ^10.1.0
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.0.1
  timezone: ^0.9.2
  workmanager: ^0.9.0+3
  url_launcher: ^6.2.1
  
  # WiFi Detection - Remove wifi_info_flutter
  # wifi_info_flutter: ^2.0.2  # Remove this line
  network_info_plus: ^4.1.0
  
  # Biometric Authentication
  local_auth: ^2.1.6
  
  # UI
  cupertino_icons: ^1.0.2
  intl: ^0.18.1
  
  # Text-to-Speech for voice confirmation
  flutter_tts: ^3.8.5
  
  # Security dependencies
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.1
  crypto: ^3.0.3
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
